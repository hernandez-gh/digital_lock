# Tiny Tapeout project information
project:
  title:        "Digital Lock"      # Project title
  author:       "Yoanlys Hernandez Barrios"      # Your name
  discord:      "yhb_disc"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A 4-step digital lock with 3 attempts, error indicator, unlock output, and lockout state."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     12000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_digital_lock"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_digital_lock.v"
    - "digital_lock.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "clear"
  ui[1]: "enter"
  ui[2]: "code_in[0]"
  ui[3]: "code_in[1]"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs
  uo[0]: "unlock"
  uo[1]: "error"
  uo[2]: "locked"
  uo[3]: "unused"
  uo[4]: "unused"
  uo[5]: "unused"
  uo[6]: "unused"
  uo[7]: "unused"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
